services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    volumes:
      - exports_data:/app/exports
      - backup_data:/app/backup
      - restore_data:/app/restore
      - storage_data:/app/storage
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV:-development}
    env_file:
      - .env.example
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    profiles: ["future"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vooglii}
      POSTGRES_USER: ${POSTGRES_USER:-vooglii}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    profiles: ["future"]
    volumes:
      - redis_data:/data

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    profiles: ["future"]
    command: ["python", "background_jobs.py"]
    env_file:
      - .env.example
    depends_on:
      - backend

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.backend
    profiles: ["future"]
    command: ["python", "scripts/smoke_api.py"]
    env_file:
      - .env.example
    depends_on:
      - backend

volumes:
  exports_data:
  backup_data:
  restore_data:
  storage_data:
  postgres_data:
  redis_data:
