services:
  backend:
    env_file:
      - .env.production
    environment:
      APP_ENV: production
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://vooglii.ru:8000}
        NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV:-production}
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    ports:
      - "80:3000"
    depends_on:
      backend:
        condition: service_started
