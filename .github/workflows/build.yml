name: Build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python compile
        run: |
          python -m py_compile api_server.py telegram_bot.py analytics/*.py scripts/smoke_api.py

      - name: Smoke API
        run: |
          python scripts/smoke_api.py | tee smoke-report.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Frontend type-check
        working-directory: frontend
        run: npm run type-check | tee ../frontend-typecheck.txt

      - name: Frontend build
        working-directory: frontend
        run: npm run build | tee ../frontend-build.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vooglii-build-artifacts
          path: |
            smoke-report.txt
            frontend-typecheck.txt
            frontend-build.txt
            VERSION
